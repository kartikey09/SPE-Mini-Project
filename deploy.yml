---
- name: Deploy Scientific Calculator Container
  # Runs directly on your Mac host
  hosts: localhost
  connection: local
  
  tasks:
    - name: Pull the latest image from Docker Hub
      command: docker pull ranag99/spe-mini-project:latest

    - name: Stop the existing calculator container (if it exists)
      command: docker stop calc-container
      # Ignores the error if this is the first time running and it doesn't exist yet
      ignore_errors: yes 

    - name: Remove the old container
      command: docker rm calc-container
      ignore_errors: yes

    - name: Start the new interactive calculator container
      # -d (detached) -i (interactive) -t (allocate TTY)
      command: docker run -dit --name calc-container ranag99/spe-mini-project:latest
